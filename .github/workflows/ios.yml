name: iOS Build & Test

# Manually triggered: the Windows dev machine cannot run Xcode/Rust-iOS, so the
# macOS runner is the authoritative build. Trigger from Actions → Run workflow.
#
# mode:
#   full                 build pinned Anki backend xcframework, then app + tests + IPA
#   backend_spike        Phase A: only prove the pinned `anki` crate compiles for iOS
#   backend_xcframework  build the backend xcframework only (no app)
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode"
        type: choice
        options: [full, backend_spike, backend_xcframework]
        default: full

permissions:
  contents: read

jobs:
  # ── Phase A/B: pinned upstream Anki Rust backend for iOS ────────────────────
  anki-backend:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest 16.x)
        run: |
          LATEST=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST/Contents/Developer"; fi
          xcodebuild -version

      - name: Install protobuf (protoc)
        run: brew install protobuf

      - name: Toolchain info
        run: |
          rustup --version
          rustc --version || true

      # Cache cargo registry + bridge target to speed up iterations. Keyed on the
      # bridge lockfile + pinned anki commit; the build is still reproducible
      # without the cache (a clean run regenerates everything).
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust/anki-backend-ios -> target"
          key: anki-3890e12c
          cache-on-failure: true

      - name: Build pinned Anki backend
        run: |
          case "${{ inputs.mode }}" in
            backend_spike) M=spike ;;
            *) M=xcframework ;;
          esac
          echo "Backend script mode: $M"
          bash tools/build-anki-backend.sh "$M"

      - name: Upload backend logs & metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anki-backend-logs
          path: |
            build/backend/*.log
            build/backend/backend-metadata.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Upload XCFramework (if built)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AnkiCore-xcframework
          path: Frameworks/AnkiCore.xcframework
          retention-days: 7
          if-no-files-found: ignore

  # ── Phase C/D: app build, tests, IPA (full mode only) ───────────────────────
  app:
    needs: anki-backend
    if: ${{ inputs.mode == 'full' }}
    runs-on: macos-15
    timeout-minutes: 60
    env:
      SCHEME: AnkiAI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest 16.x)
        run: |
          LATEST=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST/Contents/Developer"; fi
          xcodebuild -version
          swift --version

      - name: Download AnkiCore.xcframework
        uses: actions/download-artifact@v4
        with:
          name: AnkiCore-xcframework
          path: Frameworks/AnkiCore.xcframework

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          mkdir -p build
          xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project AnkiAI.xcodeproj -scheme "$SCHEME" || true

      - name: Build (generic iOS device, unsigned)
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -project AnkiAI.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tee build/device-build.log

      - name: Pick an available iOS Simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; ids=[x['udid'] for v in d.values() for x in v if x.get('isAvailable') and 'iPhone' in x['name']]; print(ids[0] if ids else '')")
          if [ -z "$UDID" ]; then echo "No iOS simulator available"; xcrun simctl list devices available; exit 1; fi
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run unit + integration tests (Simulator)
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -project AnkiAI.xcodeproj \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/TestResults.xcresult \
            test 2>&1 | tee build/test.log

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -1)
          if [ -z "$APP_PATH" ]; then echo "No .app produced"; exit 1; fi
          echo "Packaging $APP_PATH"
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -r -y AnkiAI-unsigned.ipa Payload >/dev/null)
          echo "Built IPA:"
          ls -la build/AnkiAI-unsigned.ipa

      - name: Collect dSYMs
        if: always()
        run: |
          mkdir -p build/dSYMs
          find build/DerivedData -name '*.dSYM' -exec cp -R {} build/dSYMs/ \; 2>/dev/null || true

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AnkiAI-unsigned-ipa
          path: build/AnkiAI-unsigned.ipa
          retention-days: 7
          if-no-files-found: warn

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: |
            build/*.log
            build/TestResults.xcresult
            build/dSYMs
          retention-days: 7
          if-no-files-found: warn
