name: iOS Build & Test

# Manually triggered: the Windows dev machine cannot run Xcode, so the macOS
# runner is the authoritative build. Trigger from the Actions tab → Run workflow.
on:
  workflow_dispatch:
    inputs:
      run_ui_tests:
        description: "Also run UI tests (slower)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      SCHEME: AnkiAI
      SIMULATOR: platform=iOS Simulator,name=iPhone 15,OS=latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project AnkiAI.xcodeproj -scheme "$SCHEME" || true

      - name: Build (generic iOS device, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project AnkiAI.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tee build/device-build.log

      - name: Run unit tests (Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project AnkiAI.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$SIMULATOR" \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/TestResults.xcresult \
            test 2>&1 | tee build/test.log

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -1)
          if [ -z "$APP_PATH" ]; then echo "No .app produced"; exit 1; fi
          echo "Packaging $APP_PATH"
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -r -y AnkiAI-unsigned.ipa Payload >/dev/null)
          echo "Built IPA:"
          ls -la build/AnkiAI-unsigned.ipa

      - name: Collect dSYMs
        if: always()
        run: |
          mkdir -p build/dSYMs
          find build/DerivedData -name '*.dSYM' -exec cp -R {} build/dSYMs/ \; 2>/dev/null || true

      - name: Upload IPA
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AnkiAI-unsigned-ipa
          path: build/AnkiAI-unsigned.ipa
          retention-days: 7
          if-no-files-found: warn

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: |
            build/*.log
            build/TestResults.xcresult
            build/dSYMs
          retention-days: 7
          if-no-files-found: warn
